<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="دعوة لحضور مناقشة مشروع التخرّج IntelliPharma — منصة ذكية لتحسين المسارات." />
    <title>IntelliPharma — دعوة مناقشة مشروع التخرّج</title>
    <!-- Preload the correct hero image per breakpoint so it paints fast on 4G. -->
    <link
      rel="preload"
      as="image"
      href="/hero-mobile.webp"
      type="image/webp"
      media="(max-width: 767px)"
      fetchpriority="high"
    />
    <link
      rel="preload"
      as="image"
      href="/hero-desktop.webp"
      type="image/webp"
      media="(min-width: 768px)"
      fetchpriority="high"
    />
    <script>
      // Apply theme + locale before paint to avoid a flash of the wrong mode.
      (function () {
        try {
          var params = new URLSearchParams(window.location.search);
          var t = params.get('theme') || localStorage.getItem('intellipharma.theme') || 'system';
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = t === 'dark' || (t === 'system' && prefersDark);
          var root = document.documentElement;
          root.classList.toggle('dark', dark);
          root.style.colorScheme = dark ? 'dark' : 'light';
          var l = params.get('lang') || localStorage.getItem('intellipharma.locale') || 'ar';
          root.lang = l;
          root.dir = l === 'ar' ? 'rtl' : 'ltr';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
